# Nested GQA: GQA backbone with prefix-sliceable Q heads + optional FFN nesting.
# 12 Q heads / 3 KV groups -> slice Q to {3, 6, 9, 12}. K/V stay full.
# This config exercises both axes of slicing.
# ~46M params at this size.
data:
  dataset: wikitext-103-raw-v1
  cache_dir: data/cache
  seq_len: 512

model:
  variant: nested_gqa
  d_model: 384
  n_q_heads: 12
  n_kv_heads: 3
  head_dim: 32
  n_layers: 12
  d_intermediate: 1536
  rope_base: 10000.0
  tie_embeddings: true
  granularities:
    q_heads: [3, 6, 9, 12]      # 1, 2, 3, 4 Q heads per KV group
    ffn_ratio: [0.25, 0.5, 0.75, 1.0]       # 768 or 1536 FFN intermediate

train:
  batch_size: 16
  eval_batch_size: 8
  grad_accum: 8        # effective batch = 128 (matches moe_attention_tuhh reference)
  lr: 2.5e-4
  warmup_steps: 2000
  max_steps: 100000
  weight_decay: 0.1
  grad_clip: 0.1
  amp: true
  log_interval: 200
  eval_interval: 2000
  eval_max_batches: 16
  eval_loss_chunk: 2
  seed: 1234
  sample:
    full_prob: 0.25    # P(train on the full sub-model) per step
