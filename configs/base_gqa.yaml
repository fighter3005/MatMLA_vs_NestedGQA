# Baseline GQA: 12 Q heads, 3 KV groups (4 Q per KV group), no slicing.
# ~46M params at this size.
data:
  dataset: wikitext-103-raw-v1
  cache_dir: data/cache
  seq_len: 512
  max_vocab_size: 32768

model:
  variant: baseline_gqa
  d_model: 384
  n_q_heads: 12
  n_kv_heads: 3
  head_dim: 32
  n_layers: 16
  d_intermediate: 1536
  rope_base: 10000.0
  tie_embeddings: true
  dropout: 0.1
  granularities:
    q_heads: []
    ffn_ratio: []

train:
  batch_size: 16
  eval_batch_size: 8
  grad_accum: 8        # effective batch = 128 (matches moe_attention_tuhh reference)
  lr: 2.5e-4
  warmup_steps: 0
  max_steps: 35000
  weight_decay: 0.1
  grad_clip: 0.1
  amp: true
  log_interval: 100
  eval_interval: 500
  eval_max_batches: 16
  eval_loss_chunk: 2
  seed: 1234
  sample:
    full_prob: 1.0    # baseline has no granularities; sample_submodel falls back to full
