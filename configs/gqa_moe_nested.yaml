# Nested GQA + per-head MoE on Q/O.
# GQA backbone: 12 Q heads / 3 KV groups -> slice Q to {3, 6, 9, 12}. K/V stay full.
# Each Q (and O) head is a mixture of `n_experts` experts; the router picks
# `moe_k` per token. Two slicing axes: head count AND top-k.
data:
  dataset: wikitext-103-raw-v1
  cache_dir: data/cache
  seq_len: 512
  max_vocab_size: 32768

model:
  variant: gqa_moe_nested
  d_model: 384
  n_q_heads: 12
  n_kv_heads: 3
  head_dim: 32
  n_layers: 16
  d_intermediate: 1536
  rope_base: 10000.0
  tie_embeddings: true
  dropout: 0.1
  # MoE on Q/O
  n_experts: 4
  moe_k: 2
  selection_mode: softmax       # softmax | sigmoid
  aux_loss_weight: 0.01         # load-balancing loss weight
  granularities:
    q_heads: [3, 6, 9, 12]      # 1, 2, 3, 4 Q heads per KV group
    ffn_ratio: [0.5, 1.0]       # 768 or 1536 FFN intermediate
    q_topk: [1, 2]              # experts routed per head per token

train:
  batch_size: 16
  eval_batch_size: 8
  grad_accum: 8        # effective batch = 128
  lr: 2.5e-4
  warmup_steps: 0
  max_steps: 35000
  weight_decay: 0.1
  grad_clip: 0.1
  amp: true
  log_interval: 100
  eval_interval: 500
  eval_max_batches: 16
  eval_loss_chunk: 2
  seed: 1234
  sample:
    full_prob: 0.25    # P(train on the full sub-model) per step
